# ------------------------------------------------------------
# axis_E_infection_control
# ------------------------------------------------------------
axis_E_infection_control:
  rules:
  - event_type: new_mdro_detection
    priority: 1
    severity: high
    if:
      slot: mdro_status
      equals: confirmed
      first_seen: true
    render_template: 'New MDRO detection: {mdro_flag} ({day})'
    template_vars:
    - mdro_flag
    - day
  - event_type: mdro_confirmed
    priority: 2
    severity: high
    if:
      slot: mdro_status
      equals: confirmed
    render_template: 'MDRO confirmed: {mdro_flag} ({day})'
    template_vars:
    - mdro_flag
    - day
  - event_type: isolation_gap
    priority: 3
    severity: high
    if:
      all:
      - slot: isolation_required
        not_equals: none
      - slot: isolation_applied
        equals: false
    render_template: 'Isolation not applied (gap): {isolation_required} ({day})'
    template_vars:
    - isolation_required
    - day
  - event_type: isolation_applied
    priority: 4
    severity: low
    if:
      slot: isolation_applied
      equals: true
    render_template: 'Isolation applied: {isolation_required} ({day})'
    template_vars:
    - isolation_required
    - day
  - event_type: cluster_suspected
    priority: 5
    severity: medium
    if:
      slot: cluster_suspected
      equals: true
    render_template: 'Cluster suspected: {cluster_reason} ({day})'
    template_vars:
    - cluster_reason
    - day

# ------------------------------------------------------------
# axis_F_symptom_subjective
# ------------------------------------------------------------
# 이미지 기준 우선순위:
#   1: mental_status_change   (이벤트 — altered_mentation == true)
#   2: pain_escalation        (수치 — NRS delta >= 2)
#   3: pain_relief            (수치 — NRS delta <= -2)
#   4: new_symptom_detected   (이벤트 — unknown/false → true 전환)
#   5: pain_location_change   (서술 — pain_location_hint 변경)
#   6: symptom_cluster_match  (서술 — 복합 양상) ← 주석 처리
# ------------------------------------------------------------
axis_F_symptom_subjective:
  rules:
  # Priority 1: 의식 상태 변화 (이벤트 - 최상위 임상 지표)
  - event_type: mental_status_change
    priority: 1
    severity: high
    if:
      slot: altered_mentation
      from: [unknown, false]
      to: true
    render_template: 'Alert: Altered Mentation detected ({day})'
    template_vars:
    - day

  # Priority 2: 통증 점수 급상승 (수치 - 2점 이상 상승 임계치 적용)
  - event_type: pain_escalation
    priority: 2
    severity: medium
    if:
      slot: pain_nrs_value
      delta_gte: 1
      require_both: true
    render_template: 'Pain Escalated: {prev} → {new} ({location}) ({day})'
    template_vars:
    - prev
    - new
    - location
    - day
    validate:
      numeric_slots:
      - pain_nrs_value
      coerce: float
      require_prev_new: true
      on_fail: skip

  # Priority 3: 통증 감소 (수치 - 2점 이상 하강)
  - event_type: pain_relief
    priority: 3
    severity: low
    if:
      slot: pain_nrs_value
      direction: down
      threshold_abs: 1
    render_template: 'Pain Relief: {prev} → {new} ({location}) ({day})'
    template_vars:
    - prev
    - new
    - location
    - day
    validate:
      numeric_slots:
      - pain_nrs_value
      coerce: float
      require_prev_new: true
      on_fail: skip

  # Priority 4: 신규 증상 발생 (이벤트 - unknown/false에서 전환)
  - event_type: new_symptom_detected
    priority: 4
    severity: medium
    if:
      any:
      - slot: nausea_vomiting
        from: [unknown, false]
        to: true
      - slot: diarrhea
        from: [unknown, false]
        to: true
    render_template: 'New Symptom: {symptom_name} ({day})'
    template_vars:
    - symptom_name
    - day

  # Priority 5: 통증 부위 변경 (서술/속성 - 단순 위치 이동)
  - event_type: pain_location_change
    priority: 5
    severity: info
    if:
      slot: pain_location_hint
      changed: true
      not_from: unknown  # 데이터 공백에서의 첫 발생은 신규 증상으로 간주
      require_both: true
    render_template: 'Pain Migrated: {prev_loc} → {new_loc} ({day})'
    template_vars:
    - prev_loc
    - new_loc
    - day

  # Priority 6: 증후군 패턴 매칭 (서술 - 복합 양상)
