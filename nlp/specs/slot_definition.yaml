# slot_definition_v1_3.yaml
# INFECT-GUARD MVP - 임상 축별 슬롯 정의
# 목적: 문서에서 추출할 정보 필드(슬롯)를 표준화하고, 하이브리드 추출기의 출력 계약을 정의
# ──────────────────────────────────────────────────────
# 합성 데이터 구조 반영 완료 (2026-02-10)
# patient_*/hd_*.json 실제 필드 기준으로 정합성 검증됨
# ──────────────────────────────────────────────────────

version: "1.3"
last_updated: "2026-02-10"

# ============================================================================
# 전역 규칙
# ============================================================================
global_rules:
  null_policy: "누락된 슬롯은 null로 표시 (빈 문자열 금지)"
  negation_tag: "부정(~아님) 표현이 있으면 context_tags.negation에 슬롯명 추가"
  uncertainty_tag: "의심/추정/가능성 표현이 있으면 context_tags.uncertainty에 슬롯명 추가"
  plan_tag: "계획/예정 표현이 있으면 context_tags.plan에 슬롯명 추가"
  temporality_tag: "과거/현재/미래 시제를 context_tags.temporality에 기록"

  # 중요: 진단 권한 (문서 타입별 허용 범위)
  diagnosis_authority:
    physician: "진단명, 임상 판단 허용"
    nursing: "관찰, 처치, notify만 허용 (진단/확진 금지)"
    cxr: "영상 소견만 허용 (임상 판정 금지)"
    micro: "균 동정/AST는 사실 이벤트로 기록"
    lab: "수치/결과는 사실 이벤트로 기록"

  # Tier 우선순위
  extraction_tiers:
    tier1: "구조화 필드 직접 매핑 (confidence=1.0)"
    tier2: "raw_text 정규식 + 사전 매칭 (confidence=0.9)"
    tier3: "NER 모델 추출 (confidence=모델 출력)"
    merge_rule: "동일 슬롯은 confidence 높은 Tier 우선"


# ============================================================================
# 문서 타입별 필수 슬롯 매핑
# ============================================================================
# 합성 데이터 실제 필드 기준으로 업데이트됨

document_slot_mapping:

  nursing_note:
    description: "간호기록 - SOAP 형식, Day/Evening/Night 3교대"
    structured_fields:
      # Tier 1에서 직접 매핑 가능한 구조화 필드
      vital_signs.temp: temp_value
      vital_signs.hr: hr_value
      vital_signs.rr: rr_value
      vital_signs.bp_sys: bp_sys
      vital_signs.bp_dia: bp_dia
      vital_signs.spo2: spo2_value
      o2_device: o2_device           # 값 예: "Nasal Cannula", "Simple Mask", null
      o2_flow: o2_flow_lpm           # 값 예: "2L/min", "10L/min", null
      notify_md: notify_mentioned    # boolean → presence
    text_fields: [subjective, objective, assessment, plan_action, raw_text]
    mandatory: [spo2_value, o2_device, temp_value, notify_mentioned]
    recommended: [o2_flow_lpm, dyspnea, work_of_breathing, prn_interventions, vitals_frequency, pain_nrs_value]
    optional: [monitoring_level, intake_output_monitoring, pain_location_hint, diarrhea, nausea_vomiting, altered_mentation]

  physician_note:
    description: "의사 노트 - Problem list + SOAP + Treatment"
    structured_fields:
      objective.vital_signs.bt: temp_value
      objective.vital_signs.hr: hr_value
      objective.vital_signs.rr: rr_value
      objective.vital_signs.spo2: spo2_value
      objective.vital_signs.bp: bp_string    # 문자열 "110/70" → 파싱 필요
      objective.lab_results.wbc: wbc_value   # 주의: 14000 또는 14.0 혼재 → 정규화 필요
      objective.lab_results.lactate: lactate_value
      objective.lab_results.creatinine: creatinine_value
      objective.lab_results.crp: crp_value
    text_fields: [subjective, problem_list, assessment, plan, treatment_history, raw_text]
    mandatory: []
    recommended: [abx_event, icu_eval_mentioned, transfer_consideration, sepsis_bundle_mentioned]
    optional: [diagnosis_mentioned, clinical_impression, vasopressor_mentioned, rapid_response]

  lab_result:
    description: "검사 결과 - CBC/Chemistry/Inflammatory Markers"
    structured_fields:
      # 합성 데이터에서 null이 아닌 필드만 추출
      wbc: wbc_value               # 값 예: 14 (x10³/μL) 또는 14000 → 정규화 필요
      lactate: lactate_value       # 값 예: 1.6 (mmol/L)
      cr: creatinine_value         # 값 예: 1.2 (mg/dL)
      crp: crp_value               # 현재 합성 데이터에서 0% 출현
      hgb: hgb_value
      plt: platelet_value
      bun: bun_value
      na: na_value
      k: k_value
      glucose: glucose_value
      procalcitonin: procalcitonin_value
    text_fields: [raw_text]
    mandatory: []
    recommended: [wbc_value, crp_value, platelet_value, lactate_value]
    optional: [ast_value, alt_value, creatinine_value, procalcitonin_value]
    normalization_rules:
      wbc: "14000 → 14.0 (x10³ 단위); 100 이상이면 /1000"
      platelet: "50000 → 50 (x10³ 단위)"

  radiology:
    description: "CXR 판독문 - Technique/Comparison/Findings/Impression"
    structured_fields:
      severity: cxr_severity       # 값 예: "NORMAL" → "normal"로 정규화
      findings: cxr_findings_text  # 전체 소견 텍스트 (패턴 추출 원본)
      impression: cxr_impression_text
      study_type: study_type       # 값 예: "CXR"
      comparison: comparison       # 값 예: "None" 또는 이전 검사 참조
    text_fields: [findings, impression, raw_text]
    mandatory: [cxr_severity]
    recommended: [cxr_lesion_type, cxr_location, cxr_extent]
    optional: [cxr_change_direction]

  microbiology:
    description: "미생물 배양 - Specimen/Culture/Susceptibility"
    structured_fields:
      specimen_type: specimen_type       # 값 예: "URINE"
      result_status: culture_result      # 값 예: "COLLECTED", "PENDING", "PRELIMINARY", "FINAL"
      organism: organism                 # 값 예: "Escherichia coli", "Candida spp.", "Yeast", null
      is_mdro: mdro_flag                 # boolean → mdro_type 참조
      mdro_type: mdro_flag               # 값 예: null (현재 데이터에 MDRO 없음)
      colony_count: colony_count         # 값 예: "Heavy growth", null
      gram_stain: gram_stain             # 값 예: "Many WBCs seen.", null
      susceptibility: susceptibility_list # list[{antibiotic, mic, interpretation}]
    text_fields: [comments, raw_text]
    mandatory: [specimen_type, culture_result]
    recommended: [organism, mdro_flag]
    optional: [resistance_detected, colony_count, gram_stain]
    normalization_rules:
      result_status: "COLLECTED/PENDING → 'pending', PRELIMINARY → 'preliminary', FINAL → organism 유무에 따라 'positive'/'negative'"
      specimen_type: "URINE → 'urine' (소문자 정규화)"
      susceptibility: "interpretation 'R' → resistance_detected에 항생제명 기록"


# ============================================================================
# Axis A: Respiratory (호흡)
# ============================================================================
axis_a_respiratory:
  description: "산소요구량/SpO₂/CXR 병변의 변화 근거를 시간순으로 제시"
  primary_documents: [nursing_note, radiology]
  secondary_documents: [physician_note]

  slots:
    spo2_value:
      type: integer
      range: [50, 100]
      unit: "%"
      source_docs: [nursing_note]
      required: true
      structured_source: "vital_signs.spo2"
      extraction_hints:
        - "SpO2"
        - "산소포화도"
        - "O2 sat"
        - "(?i)sp\\s*o\\s*2\\s*:?\\s*(\\d{2,3})\\s*%?"

    o2_device:
      type: enum
      allowed_values: [RA, NC, SM, VM, NRM, HFNC, unknown]
      source_docs: [nursing_note]
      required: true
      structured_source: "o2_device"
      normalize:
        null: "RA"          # o2_device 필드 없으면 RA 추정
        "Nasal Cannula": "NC"
        "Simple Mask": "SM"
        "Venturi Mask": "VM"
        "room air": "RA"
      extraction_hints:
        - "RA"
        - "NC"
        - "SM"
        - "NRM"
        - "HFNC"
        - "room air"
        - "Nasal Cannula"
        - "Simple Mask"

    o2_flow_lpm:
      type: float
      range: [0, 60]
      unit: "L/min"
      source_docs: [nursing_note]
      required: false
      structured_source: "o2_flow"
      normalize: "문자열 '2L/min' → float 2.0, '10L/min' → 10.0"
      extraction_hints:
        - "(?i)(\\d+\\.?\\d*)\\s*L/?m"
        - "NC 2L"
        - "3리터"

    dyspnea:
      type: tri_bool
      source_docs: [nursing_note, physician_note]
      required: false
      structured_source: null  # raw_text에서만 추출
      extraction_hints:
        - "호흡곤란"
        - "숨참"
        - "dyspnea"
        - "SOB"
        - "breathlessness"

    work_of_breathing:
      type: enum
      allowed_values: [none, mild, moderate, severe, unknown]
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "accessory muscle"
        - "labored breathing"
        - "tachypnea"
        - "노력호흡"
        - "비익호흡"
        - "빈호흡"

    breath_sounds:
      type: string
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "crackles"
        - "rales"
        - "rhonchi"
        - "wheezing"
        - "diminished"
        - "수포음"
        - "천명음"
        - "호흡음 감소"

    sputum_character:
      type: string
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "purulent"
        - "yellowish"
        - "greenish"
        - "blood-tinged"
        - "농성 객담"
        - "누런 가래"
        - "혈담"

    cxr_lesion_type:
      type: list[enum]
      allowed_values: [opacity, consolidation, infiltration, effusion, atelectasis, edema, hazy, ground_glass, nodule, mass, unknown]
      source_docs: [radiology]
      required: false
      structured_source: null  # findings/impression에서 정규식 추출
      extraction_hints:
        - "Consolidation"
        - "Opacity"
        - "Infiltration"
        - "Effusion"
        - "침윤"
        - "음영"
        - "경화"
        - "삼출"

    cxr_location:
      type: list[enum]
      allowed_values: [RUL, RML, RLL, LUL, LLL, bilateral, diffuse, perihilar, basal, apical, unknown]
      source_docs: [radiology]
      required: false
      structured_source: null
      extraction_hints:
        - "RLL"
        - "LLL"
        - "both lung"
        - "양측"

    cxr_extent:
      type: enum
      allowed_values: [focal, patchy, multifocal, diffuse, unknown]
      source_docs: [radiology]
      required: false
      structured_source: null

    cxr_severity:
      type: enum
      allowed_values: [normal, minimal, mild, moderate, severe, unknown]
      source_docs: [radiology]
      required: true
      structured_source: "severity"
      normalize:
        "NORMAL": "normal"
      extraction_hints:
        - "minimal"
        - "mild"
        - "moderate"
        - "severe"
        - "marked"
        - "경미"
        - "중등도"
        - "심함"

    cxr_change_direction:
      type: enum
      allowed_values: [worsening, improving, stable, unknown]
      source_docs: [radiology]
      required: false
      structured_source: null
      extraction_hints:
        - "worsening"
        - "improved"
        - "stable"
        - "no interval change"

    resp_support_event:
      type: enum
      allowed_values: [start, increase, decrease, stop, none, unknown]
      source_docs: [nursing_note]
      required: false
      structured_source: null  # raw_text의 "O2 start", "증량" 등에서 추출
      extraction_hints:
        - "O2 start"
        - "증량"
        - "감량"
        - "중단"
        - "apply"
        - "(\\d+)\\s*L\\s*→\\s*(\\d+)\\s*L"


# ============================================================================
# Axis B: Infection Activity (감염 활성)
# ============================================================================
axis_b_infection_activity:
  description: "감염 활성/치료 강화의 변화 근거 제시 (진단이 아니라 활성도)"
  primary_documents: [lab_result, microbiology, physician_note]
  secondary_documents: [nursing_note]

  slots:
    temp_value:
      type: float
      range: [35.0, 42.0]
      unit: "°C"
      source_docs: [nursing_note, lab_result]
      required: false
      structured_source: "vital_signs.temp (nursing), objective.vital_signs.bt (physician)"
      extraction_hints:
        - "(?i)(?:BT|체온|Temp)\\s*:?\\s*(\\d{2}\\.\\d)"
        - "BT"
        - "체온"
        - "fever"

    wbc_value:
      type: float
      range: [0, 100]
      unit: "x10³/μL"
      source_docs: [lab_result, physician_note]
      required: false
      structured_source: "wbc (lab), objective.lab_results.wbc (physician)"
      normalization: "14000 → 14.0 (x10³ 단위), 100 이상이면 /1000"
      extraction_hints:
        - "WBC"
        - "백혈구"
        - "(?i)WBC\\s*:?\\s*(\\d+\\.?\\d*)"

    crp_value:
      type: float
      range: [0, 500]
      unit: "mg/dL"
      source_docs: [lab_result, physician_note]
      required: false
      structured_source: "crp (lab), objective.lab_results.crp (physician)"
      note: "현재 합성 데이터에서 0% 출현 — 향후 시나리오 추가 시 활성화"

    lactate_value:
      type: float
      range: [0, 20]
      unit: "mmol/L"
      source_docs: [lab_result, physician_note]
      required: false
      structured_source: "lactate (lab), objective.lab_results.lactate (physician)"
      extraction_hints:
        - "Lactate"
        - "젖산"
        - "(?i)Lactate\\s*:?\\s*(\\d+\\.?\\d*)"

    platelet_value:
      type: integer
      range: [0, 1000]
      unit: "x10³/μL"
      source_docs: [lab_result]
      required: false
      structured_source: "plt (lab)"
      normalization: "50000 → 50 (x10³ 단위)"
      note: "v1.2+ 필수급 — SFTS/쯔쯔가무시 감염 커버"

    ast_value:
      type: integer
      range: [0, 10000]
      unit: "U/L"
      source_docs: [lab_result]
      required: false
      structured_source: "ast (lab)"

    alt_value:
      type: integer
      range: [0, 10000]
      unit: "U/L"
      source_docs: [lab_result]
      required: false
      structured_source: "alt (lab)"

    creatinine_value:
      type: float
      range: [0, 20]
      unit: "mg/dL"
      source_docs: [lab_result, physician_note]
      required: false
      structured_source: "cr (lab), objective.lab_results.creatinine (physician)"
      note: "UTI/패혈증 전구 증상 모니터링에 유용"

    procalcitonin_value:
      type: float
      range: [0, 100]
      unit: "ng/mL"
      source_docs: [lab_result]
      required: false
      structured_source: "procalcitonin (lab)"
      note: "현재 합성 데이터에서 0% 출현"

    culture_ordered:
      type: list[enum]
      allowed_values: [blood, urine, stool, sputum, wound]
      source_docs: [physician_note, nursing_note]
      required: false
      structured_source: null  # raw_text에서 정규식 추출
      extraction_hints:
        - "blood culture"
        - "urine culture"
        - "배양 검사"
        - "(?i)(blood|urine|sputum|stool|wound)\\s*(culture|Cx)"

    culture_result:
      type: object
      nullable: true
      source_docs: [microbiology]
      required: false
      structured_source: "result_status + organism"
      schema:
        status: [pos, neg, no_growth, pending, preliminary, contaminated, unknown]
        organism: string_or_null
      normalize:
        "COLLECTED": "pending"
        "PENDING": "pending"
        "PRELIMINARY": "pending"
        "FINAL": "organism 유무에 따라 pos/neg"

    organism:
      type: string
      source_docs: [microbiology]
      required: false
      structured_source: "organism"
      note: "실제 데이터 값: Escherichia coli, Candida spp., Yeast"

    colony_count:
      type: string
      source_docs: [microbiology]
      required: false
      structured_source: "colony_count"
      note: "실제 데이터 값: 'Heavy growth', null"

    susceptibility_list:
      type: list[object]
      schema:
        antibiotic: string
        mic: string
        interpretation: enum[S, I, R]
      source_docs: [microbiology]
      required: false
      structured_source: "susceptibility"
      note: "실제 데이터 예: [{antibiotic: Ciprofloxacin, mic: '<=1', interpretation: S}]"

    resistance_detected:
      type: list[string]
      source_docs: [microbiology]
      required: false
      structured_source: null  # susceptibility에서 interpretation='R' 필터링
      note: "susceptibility 중 R인 항생제명 추출"

    fever_present:
      type: boolean
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "fever"
        - "febrile"
        - "chills"
        - "rigors"
        - "발열"
        - "고열"
        - "오한"
      note: "temp_value와 별도로 발열 유무를 boolean으로 기록"

    abx_event:
      type: enum
      allowed_values: [start, change, escalate, deescalate, stop, none, unknown]
      source_docs: [physician_note, nursing_note]
      required: false
      structured_source: null  # raw_text의 plan, treatment_history에서 추출
      extraction_hints:
        - "Start empiric Ceftriaxone"
        - "항생제 변경"
        - "escalate"
        - "broaden"
        - "D/C"

    diagnosis_mentioned:
      type: string
      source_docs: [physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "pneumonia"
        - "CAP"
        - "HAP"
        - "UTI"
        - "pyelonephritis"
        - "sepsis"
        - "bacteremia"
        - "cellulitis"
        - "SFTS"
        - "쯔쯔가무시"
      note: "의사 기록에서 언급된 감염 관련 진단명"

    clinical_impression:
      type: string
      source_docs: [physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "impression"
        - "clinical impression"
        - "assessment"
        - "임상 소견"
      note: "의사의 종합적 임상 인상/평가 텍스트"

    abx_class_hint:
      type: enum
      allowed_values: [broad, narrow, unknown]
      source_docs: [physician_note]
      required: false
      note: "MVP에서는 광범위 여부만 판정"


# ============================================================================
# Axis C: Clinical Action (개입 강도)
# ============================================================================
axis_c_clinical_action:
  description: "의료진이 얼마나 바빠졌는가를 시간축으로 표시"
  primary_documents: [nursing_note]
  secondary_documents: [physician_note]

  slots:
    notify_mentioned:
      type: boolean
      source_docs: [nursing_note]
      required: true
      structured_source: "notify_md (boolean)"
      extraction_hints:
        - "Dr notify"
        - "notify함"
        - "** 담당의 notify함 **"
        - "(?i)Dr\\.?\\s*notify"
      note: "notify 발생 여부만 기록"

    prn_interventions:
      type: list[enum]
      allowed_values: [neb, suction, antipyretic, iv_fluid, antiemetic, antidiarrheal, analgesic, oxygen_prn, unknown]
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "PRN"
        - "필요시"
        - "해열제"
        - "수액"
        - "bolus"

    monitoring_level:
      type: enum
      allowed_values: [standard, enhanced, intensive, unknown]
      source_docs: [nursing_note]
      required: false
      structured_source: null

    vitals_frequency:
      type: enum
      allowed_values: [q8h, q6h, q4h, q2h, continuous, unknown]
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "(?i)q\\s*([12468])\\s*h"
        - "q4h V/S"
        - "Monitoring: q4h"

    imaging_ordered:
      type: list[enum]
      allowed_values: [CXR, CT_chest, CT_abdomen, unknown]
      source_docs: [physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "CXR"
        - "CT chest"
        - "CT abdomen"
        - "chest X-ray"
      note: "영상 검사 오더 기록"

    new_orders_count:
      type: integer
      range: [0, 100]
      source_docs: [physician_note]
      required: false

    intake_output_monitoring:
      type: tri_bool
      source_docs: [nursing_note]
      required: false
      extraction_hints:
        - "I/O"
        - "intake output"
        - "섭취량/배설량"
      note: "GI/UTI에서 매우 유용"


# ============================================================================
# Axis D: Escalation (중증/전원 신호)
# ============================================================================
axis_d_escalation:
  description: "상향치료/전원 고려의 최초 등장 시점 포착 (binary + timing)"
  primary_documents: [physician_note]
  secondary_documents: [nursing_note]

  slots:
    icu_eval_mentioned:
      type: boolean
      source_docs: [physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "ICU"
        - "중환자실"
        - "intensive care"
        - "(?i)ICU\\s*(eval|transfer|consult)"

    transfer_consideration:
      type: boolean
      source_docs: [physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "transfer"
        - "전원"
        - "refer"
        - "higher level care"
        - "상급 병원"

    rapid_response:
      type: boolean
      source_docs: [nursing_note, physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "RRT"
        - "rapid response"
        - "code blue"
        - "응급 호출"

    sepsis_bundle_mentioned:
      type: tri_bool
      source_docs: [physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "sepsis bundle"
        - "패혈증 프로토콜"

    vasopressor_mentioned:
      type: tri_bool
      source_docs: [physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "vasopressor"
        - "승압제"
        - "norepinephrine"
      note: "MVP에서는 언급만 체크"

    hemodynamic_instability:
      type: boolean
      source_docs: [nursing_note, physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "hypotension"
        - "BP drop"
        - "tachycardia"
        - "shock"
        - "저혈압"
        - "혈압 저하"
        - "빈맥"
        - "쇼크"
      note: "에스컬레이션 신호로 활용"

    time_first_seen:
      type: object
      schema:
        icu_eval: {type: datetime, nullable: true}
        transfer: {type: datetime, nullable: true}
        rrt: {type: datetime, nullable: true}
      source_docs: [physician_note, nursing_note]
      required: false
      note: "각 이벤트의 최초 발생 시각 기록 — Phase 6B trajectory에서 활용"


# ============================================================================
# Axis E: Infection Control / Transmission (감염관리·전파)
# ============================================================================
axis_e_infection_control:
  description: "MDRO/격리/코호트/전파 운영 이벤트 모니터링"
  primary_documents: [microbiology, nursing_note]
  secondary_documents: [physician_note]

  slots:
    mdro_flag:
      type: enum
      allowed_values: [MRSA, VRE, CRE, CPE, ESBL, VRSA, Carbapenemase, MDRO_unspecified, none, unknown]
      source_docs: [microbiology]
      required: false
      structured_source: "is_mdro (boolean) + mdro_type (string)"
      note: "현재 합성 데이터에서 is_mdro=False만 존재 — 향후 MDRO 시나리오 추가 시 활성화"

    mdro_status:
      type: enum
      allowed_values: [suspected, confirmed, cleared, unknown]
      source_docs: [microbiology, physician_note]
      required: false

    specimen_type:
      type: enum
      allowed_values: [blood, urine, stool, sputum, wound, unknown]
      source_docs: [microbiology]
      required: false
      structured_source: "specimen_type"
      normalize:
        "URINE": "urine"
        "BLOOD": "blood"
      note: "현재 합성 데이터: URINE만 존재"

    result_time:
      type: datetime
      format: "ISO-8601"
      source_docs: [microbiology]
      required: false
      structured_source: "result_datetime"
      note: "50% null (배양 결과 대기 중인 문서)"

    collection_time:
      type: datetime
      format: "ISO-8601"
      source_docs: [microbiology]
      required: false
      structured_source: "collection_datetime"

    gram_stain:
      type: string
      source_docs: [microbiology]
      required: false
      structured_source: "gram_stain"
      note: "실제 값: 'Many WBCs seen.', null"

    isolation_required:
      type: enum
      allowed_values: [none, contact, droplet, airborne, enteric, unknown]
      source_docs: [physician_note, nursing_note]
      required: false
      structured_source: null

    isolation_applied:
      type: tri_bool
      source_docs: [nursing_note]
      required: false
      structured_source: null

    isolation_start_time:
      type: datetime
      format: "ISO-8601"
      source_docs: [nursing_note]
      required: false

    isolation_end_time:
      type: datetime
      format: "ISO-8601"
      source_docs: [nursing_note]
      required: false

    cohort_key:
      type: string
      format: "WARD_CODE|ORGANISM|ISOLATION_TYPE"
      example: "WARD71W|VRE|CONTACT"
      source_docs: [nursing_note, physician_note]
      required: false
      note: "병동 운영용 묶음 키"

    room_move_event:
      type: enum
      allowed_values: [moved_to_single, moved_to_cohort, none, unknown]
      source_docs: [nursing_note]
      required: false

    cluster_suspected:
      type: tri_bool
      source_docs: [nursing_note, physician_note, microbiology]
      required: false

    cluster_evidence:
      type: object
      schema:
        same_organism: boolean
        same_syndrome: boolean
        time_window_overlap: boolean
        room_overlap: boolean
      source_docs: [microbiology, nursing_note]
      required: false


# ============================================================================
# Axis F: Subjective / Symptom (주관적 증상 — Snapshot에 fact만)
# ============================================================================
# 이전 논의 결정: pain_nrs_trend, symptom_cluster_flag는 trajectory_events로 이동
# snapshot에는 시점 t의 관찰 사실만 기록

axis_f_subjective_symptom:
  description: "통증/GI/정신상태 등 주관적 증상의 시점 사실 기록 (trend는 trajectory에서 계산)"
  primary_documents: [nursing_note]
  secondary_documents: [physician_note]

  slots:
    pain_nrs_value:
      type: integer
      range: [0, 10]
      unit: "점"
      source_docs: [nursing_note]
      required: false
      structured_source: null  # raw_text에서만 추출
      extraction_hints:
        - "NRS"
        - "통증"
        - "pain score"
        - "VAS"
        - "(?i)(?:NRS|pain\\s*score|통증)\\s*:?\\s*(\\d{1,2})\\s*/\\s*10"
        - "(?i)NRS\\s*(\\d{1,2})"
        - "통증\\s*(\\d{1,2})\\s*점"
      note: "trend(increase/decrease)는 diff_rules에서 계산 → trajectory_events"

    pain_location_hint:
      type: enum
      allowed_values: [abdomen, flank, back, chest, head, suprapubic, epigastric, extremity, generalized, unknown]
      source_docs: [nursing_note, physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "abdominal pain"
        - "복통"
        - "flank pain"
        - "옆구리 통증"
        - "(?i)(abdominal|flank|back|chest|suprapubic|epigastric)\\s*pain"
      normalize:
        abdominal: "abdomen"
        복통: "abdomen"
        옆구리: "flank"
        허리: "back"
        두통: "head"
        흉통: "chest"

    diarrhea:
      type: tri_bool
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "diarrhea"
        - "loose stool"
        - "watery"
        - "설사"
        - "물변"

    nausea_vomiting:
      type: tri_bool
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "vomiting"
        - "nausea"
        - "구토"
        - "오심"
        - "구역"

    altered_mentation:
      type: tri_bool
      source_docs: [nursing_note, physician_note]
      required: false
      structured_source: null
      extraction_hints:
        - "AMS"
        - "confusion"
        - "drowsy"
        - "stupor"
        - "의식저하"
        - "혼미"
        - "기면"

    foley_catheter:
      type: boolean
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "Foley"
        - "catheter"
        - "소변줄"
      note: "UTI 위험 인자"

    tick_eschar:
      type: boolean
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "eschar"
        - "inoculation eschar"
        - "가피"
        - "검은 딱지"
        - "물린 자국"
        - "bite mark"
        - "black crust"
        - "crust (tick/bite context)"

    tick_exposure:
      type: boolean
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "밭일"
        - "농사"
        - "야외활동"
        - "야외 작업"
        - "등산"
        - "진드기"
        - "tick-borne"
        - "tick bite"
        - "hiking"
        - "outdoor farming"

    urinary_symptoms_present:
      type: boolean
      source_docs: [nursing_note]
      required: false
      structured_source: null
      extraction_hints:
        - "dysuria"
        - "hematuria"
        - "oliguria"
        - "turbid"
        - "배뇨통"
        - "혈뇨"
        - "잔뇨감"
        - "소변 혼탁"
      note: "UTI 선별용 비뇨기 증상 유무"


# ============================================================================
# 추가 Vitals (축 미배정 — Snapshot 보조 데이터)
# ============================================================================
supplementary_vitals:
  description: "Axis에 직접 배정되지 않지만 Snapshot에 포함되는 바이탈"

  slots:
    hr_value:
      type: integer
      range: [30, 250]
      unit: "bpm"
      source_docs: [nursing_note, physician_note]
      structured_source: "vital_signs.hr (nursing), objective.vital_signs.hr (physician)"

    rr_value:
      type: integer
      range: [5, 60]
      unit: "breaths/min"
      source_docs: [nursing_note, physician_note]
      structured_source: "vital_signs.rr (nursing), objective.vital_signs.rr (physician)"

    bp_sys:
      type: integer
      range: [50, 250]
      unit: "mmHg"
      source_docs: [nursing_note, physician_note]
      structured_source: "vital_signs.bp_sys (nursing), objective.vital_signs.bp 파싱 (physician)"
      note: "physician에서는 '110/70' 문자열 → 파싱 필요"

    bp_dia:
      type: integer
      range: [20, 150]
      unit: "mmHg"
      source_docs: [nursing_note, physician_note]
      structured_source: "vital_signs.bp_dia (nursing), objective.vital_signs.bp 파싱 (physician)"

    hgb_value:
      type: float
      range: [3, 20]
      unit: "g/dL"
      source_docs: [lab_result]
      structured_source: "hgb"

    bun_value:
      type: float
      range: [0, 200]
      unit: "mg/dL"
      source_docs: [lab_result]
      structured_source: "bun"

    na_value:
      type: float
      range: [100, 180]
      unit: "mEq/L"
      source_docs: [lab_result]
      structured_source: "na"

    k_value:
      type: float
      range: [2, 8]
      unit: "mEq/L"
      source_docs: [lab_result]
      structured_source: "k"

    glucose_value:
      type: float
      range: [0, 1000]
      unit: "mg/dL"
      source_docs: [lab_result]
      structured_source: "glucose"


# ============================================================================
# Context Tags (부정/불확실성/계획 태깅)
# ============================================================================
context_tags_schema:
  negation:
    type: list[string]
    description: "부정 표현이 있는 슬롯명 리스트"
    examples:
      - '"호흡곤란 없음" → negation: [dyspnea]'
      - '"배양 음성" → negation: [culture_result]'

  uncertainty:
    type: list[string]
    description: "불확실성/의심 표현이 있는 슬롯명 리스트"
    examples:
      - '"UTI 의심" → uncertainty: [diagnosis_mentioned]'
      - '"r/o UTI" → uncertainty: [diagnosis_mentioned]'

  plan:
    type: list[string]
    description: "계획/예정 표현이 있는 슬롯명 리스트"
    examples:
      - '"내일 CXR 예정" → plan: [imaging_ordered]'
      - '"항생제 변경 고려" → plan: [abx_event]'

  temporality:
    type: object
    schema:
      past: list[string]
      present: list[string]
      future: list[string]
    examples:
      - '"어제 SpO2 88%" → temporality.past: [spo2_value]'
      - '"현재 NC 3L" → temporality.present: [o2_device, o2_flow_lpm]'


# ============================================================================
# Evidence Spans (추출 근거 저장)
# ============================================================================
evidence_span_schema:
  type: list[object]
  schema:
    text:
      type: string
      description: "원문에서 추출한 텍스트 조각 (최소 1문장, 권장 ±1문장 맥락)"
    start:
      type: integer
      description: "시작 위치 (character offset)"
    end:
      type: integer
      description: "종료 위치 (character offset)"
    slot:
      type: string
      description: "해당하는 슬롯명"
    confidence:
      type: float
      range: [0.0, 1.0]
      description: "추출 신뢰도 (구조화=1.0, 규칙=0.9, 모델=0.0~1.0)"
    method:
      type: enum
      values: [structured, regex, dictionary, ner]
      description: "추출 방법"


# ============================================================================
# 출력 JSON 스키마 (document_extraction → tagged_slots.jsonl)
# ============================================================================
output_schema:
  document_id:
    type: string
    description: "문서 고유 ID (예: N_16836931_21801021_0930_001)"
  patient_id:
    type: string
    description: "환자 고유 ID"
  hadm_id:
    type: string
    description: "입원(또는 에피소드) ID (synthetic 기준 일부 문서만 존재 가능)"
  document_type:
    type: enum
    values: [nursing_note, physician_note, lab_result, radiology, microbiology]
  doc_datetime:
    type: datetime
    format: "ISO-8601"
    description: "문서 작성 시각"
  hd:
    type: integer
    description: "Hospital Day"
  d_number:
    type: integer
    description: "D-number (D0=발병일, D-1=전일, D+1=다음날)"
  extracted_slots:
    type: object
    description: "추출된 슬롯들 (슬롯명: 값)"
  slots_detail:
    type: list[object]
    description: "슬롯별 상세 (value, confidence, method, evidence_text)"
  context_tags:
    type: object
    description: "부정/불확실성/계획/시제 태그"
  evidence_spans:
    type: list[object]
    description: "추출 근거 텍스트 조각들"


# ============================================================================
# 버전 관리
# ============================================================================
version_history:
  v1.3:
    date: "2026-02-10"
    changes:
      - "합성 데이터(patient_*/hd_*.json) 실제 필드 기준으로 전면 업데이트"
      - "Axis F (주관적 증상) 추가: pain_nrs_value, pain_location_hint, diarrhea, nausea_vomiting, altered_mentation, foley_catheter, tick_eschar, tick_exposure"
      - "document_slot_mapping에 structured_fields 추가 (Tier 1 직접 매핑 명세)"
      - "normalization_rules 추가 (WBC 14000→14.0, result_status 정규화 등)"
      - "supplementary_vitals 추가 (hr, rr, bp_sys, bp_dia, hgb, bun, na, k, glucose)"
      - "output_schema를 tagged_slots.jsonl 실제 구조에 맞춤"
      - "evidence_span_schema에 method 필드 추가"
      - "extraction_tiers 전역 규칙 추가 (Tier 1/2/3 우선순위)"
      - "o2_device normalize에 'Nasal Cannula'→NC, 'Simple Mask'→SM 추가 (실제 데이터 값)"
      - "culture_status에 'preliminary' 추가 (실제 데이터 PRELIMINARY 존재)"
      - "pain trend → trajectory_events로 이동 결정 반영"
  v1.2:
    date: "2026-02-03"
    changes:
      - "Axis E (감염관리·전파) 추가"
      - "platelet_value를 권장 필수로 상향 (진드기 감염 커버)"
      - "intake_output_monitoring 추가 (GI/UTI 커버)"
      - "cluster_evidence 상세화"
  v1.1:
    date: "2026-01-29"
    changes:
      - "초기 슬롯 정의"
      - "Axis A~D 슬롯 정의 완료"
